# MLA-lite counterpart to mini_8gb.yaml. Profile before training.
vocab_size: 261
d_model: 256
n_layers: 6
n_heads: 8
n_kv_heads: 2
d_ff: 768
max_seq_len: 512
attention_type: mla_lite
rope_base: 10000.0
use_sdpa: true
use_moe: false
n_experts: 4
experts_per_token: 1
moe_capacity_factor: 1.25
moe_load_balance_coef: 0.01
moe_router_z_loss_coef: 0.001
moe_shared_expert: true
recurrent_depth: 1
recurrent_halt_mode: fixed
recurrent_min_steps: 1
latent_scratchpad_size: 0
mla_latent_dim: 64
dropout: 0.0
tie_embeddings: true
dtype: bfloat16
device: cuda
seed: 2026
diagnostics_default: false
